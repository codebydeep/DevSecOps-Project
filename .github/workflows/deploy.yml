name: Complete DevSecOps Pipeline with Trivy, Snyk and SonarQube

on:
  push:
    branches:
      - main

jobs:
  sonar-qube-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST }}

  snyk-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js             
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk - Test Frontend Dependencies
        run: snyk test --file=frontend/package.json --severity-threshold=high
        continue-on-error: true         

      - name: Snyk - Test Backend Dependencies
        run: snyk test --file=backend/package.json --severity-threshold=high
        continue-on-error: true

      - name: Snyk - Docker Image Scan Frontend
        run: snyk container test ${{ secrets.DOCKERHUB_USERNAME }}/app-frontend:latest --severity-threshold=high
        continue-on-error: true

      - name: Snyk - Docker Image Scan Backend
        run: snyk container test ${{ secrets.DOCKERHUB_USERNAME }}/app-backend:latest --severity-threshold=high
        continue-on-error: true        

  trivy-image-scan-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/app-frontend:latest

      - name: Run Trivy Image Scan - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/app-frontend:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  trivy-image-scan-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/app-backend:latest

      - name: Run Trivy Image Scan - Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/app-backend:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  trivy-scan-mongo:
    runs-on: ubuntu-latest

    steps:
      - name: Trivy Scan - MongoDB
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'mongo:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/ubuntu/Launchpad
            git pull
            docker compose up -d --build
