stages:
    - sonar_qube scan
    - snyk scan
    - trivy scan
    - deploy

SonarQube Scanning:
  stage: sonar_qube scan
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
    SONAR_TOKEN: $SONAR_TOKEN
    SONAR_HOST_URL: $SONAR_HOST_URL
  script:
    - sonar-scanner -Dsonar.qualitygate.wait=true
  allow_failure: false
  rules:
    - if: $CI_COMMIT_REF_NAME == 'main' || $CI_PIPELINE_SOURCE == 'merge_request_event'

Snyk Scan:
  stage: snyk scan
  image: node:18
  before_script:
    - npm install -g snyk
    - snyk auth $SNYK_TOKEN
  script:
    - snyk test --file=frontend/package.json --severity-threshold=high || true
    - snyk test --file=backend/package.json --severity-threshold=high || true
    - snyk container test $DOCKERHUB_USERNAME/app-frontend:latest --severity-threshold=high || true
    - snyk container test $DOCKERHUB_USERNAME/app-backend:latest --severity-threshold=high || true
  allow_failure: true
  rules:
    - if: $CI_COMMIT_REF_NAME == 'main' || $CI_PIPELINE_SOURCE == 'merge_request_event'

trivy-image-scan-frontend:
  stage: trivy scan
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_TOKEN
    - docker pull $DOCKERHUB_USERNAME/app-frontend:latest
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - trivy image --format table --severity CRITICAL,HIGH --exit-code 0 $DOCKERHUB_USERNAME/app-frontend:latest
  allow_failure: true
  rules:
    - if: $CI_COMMIT_REF_NAME == 'main' || $CI_PIPELINE_SOURCE == 'merge_request_event'

trivy-image-scan-backend:
  stage: trivy scan
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_TOKEN
    - docker pull $DOCKERHUB_USERNAME/app-backend:latest
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - trivy image --format table --severity CRITICAL,HIGH --exit-code 0 $DOCKERHUB_USERNAME/app-backend:latest
  allow_failure: true
  rules:
    - if: $CI_COMMIT_REF_NAME == 'main' || $CI_PIPELINE_SOURCE == 'merge_request_event'

trivy-scan-mongo:
  stage: trivy scan
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - trivy image --format table --severity CRITICAL,HIGH --exit-code 0 mongo:latest
  allow_failure: true
  rules:
    - if: $CI_COMMIT_REF_NAME == 'main' || $CI_PIPELINE_SOURCE == 'merge_request_event'

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client git
    - eval $(ssh-agent -s)
    - echo "$SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - ssh -o StrictHostKeyChecking=no ubuntu@$SSH_HOST "
        set -e &&
        cd /home/ubuntu/gitlab/dev-sec-ops-project &&
        git pull &&
        docker compose up -d --build
      "
  rules:
    - if: $CI_COMMIT_REF_NAME == 'main'